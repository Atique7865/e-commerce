# =============================================================================
# nginx/conf.d/talentheart.conf
# Virtual host — TalentHeart Limited
#
# Architecture:
#   Browser → Nginx (80/443)
#               ├── /static/  → served directly from staticfiles volume
#               ├── /media/   → served directly from media volume
#               └── /*        → proxied to Gunicorn on web:8000
# =============================================================================

# Upstream Gunicorn application server
upstream talentheart_app {
    server web:8000;             # Docker service name; replace with pod IP in bare-metal
    keepalive 32;                # reuse connections to gunicorn workers
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect  (uncomment when SSL cert is in place)
# ---------------------------------------------------------------------------
# server {
#     listen 80;
#     server_name talentheart.com www.talentheart.com;
#     return 301 https://$host$request_uri;
# }

# ---------------------------------------------------------------------------
# Main server block
# ---------------------------------------------------------------------------
server {
    listen       80;
    server_name  talentheart.com www.talentheart.com localhost;

    charset utf-8;

    # ---- Logs ---------------------------------------------------------------
    access_log  /var/log/nginx/talentheart_access.log  main;
    error_log   /var/log/nginx/talentheart_error.log   warn;

    # ---- Static files -------------------------------------------------------
    # Django's collectstatic dumps files into /app/staticfiles (mapped as a
    # Docker named volume shared between the web and nginx containers).
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;                      # aggressive cache — content-hashed filenames
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;                  # don't clutter logs with asset hits
    }

    # ---- Media files (user uploads) -----------------------------------------
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---- Favicon & robots ---------------------------------------------------
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; return 200 "User-agent: *\nDisallow:\n"; }

    # ---- Rate-limit sensitive endpoints -------------------------------------
    location /accounts/login/ {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://talentheart_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /accounts/signup/ {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://talentheart_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- Django application (catch-all) -------------------------------------
    location / {
        proxy_pass http://talentheart_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- Deny hidden files --------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

