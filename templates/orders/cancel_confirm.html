{% extends 'base.html' %}

{% block title %}Cancel Order #{{ order.pk }} — TalentHeart{% endblock %}

{% block content %}
<section class="py-5 min-vh-75 d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger display-3 mb-3 d-block"></i>
        <h2 class="fw-bold mb-2">Cancel Order #{{ order.pk }}?</h2>
        <p class="text-muted mb-4">
          You are about to cancel <strong>{{ order.project_name }}</strong>
          ({{ order.service.name }}). This action cannot be undone.
        </p>
        <form method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger btn-lg me-2">
            Yes, Cancel Order
          </button>
          <a href="{{ order.get_absolute_url }}" class="btn btn-outline-secondary btn-lg">
            Go Back
          </a>
        </form>
      </div>
    </div>
  </div>
</section>
{% endblock %}
