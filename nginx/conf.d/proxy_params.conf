# =============================================================================
# nginx/conf.d/proxy_params.conf
# Shared proxy headers — included by every proxied location block
# =============================================================================
proxy_http_version 1.1;
proxy_set_header   Host              $host;
proxy_set_header   X-Real-IP         $remote_addr;
proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header   X-Forwarded-Proto $scheme;
proxy_set_header   Connection        "";     # enable keepalive to upstream

proxy_redirect     off;
proxy_read_timeout 60s;
proxy_connect_timeout 10s;
proxy_send_timeout 60s;

# Buffer responses to avoid slow clients holding gunicorn workers
proxy_buffering           on;
proxy_buffer_size         8k;
proxy_buffers             8 8k;
proxy_busy_buffers_size   16k;
