# =============================================================================
# docker-compose.yml — Development stack
# Services: web (Django+Gunicorn), db (PostgreSQL), redis, nginx
# Usage: docker compose up --build
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:    # PostgreSQL data persistence
  redis_data:       # Redis AOF/RDB persistence
  staticfiles:      # Shared between web (writer) and nginx (reader)
  media_files:      # User-uploaded media

# ---------------------------------------------------------------------------
# Shared environment defaults (DRY reference anchor)
# ---------------------------------------------------------------------------
x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: talentheart.settings
  SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
  DEBUG: ${DEBUG:-True}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
  DB_NAME:     ${DB_NAME:-talentheart_db}
  DB_USER:     ${DB_USER:-talentheart}
  DB_PASSWORD: ${DB_PASSWORD:-talentheart_pass}
  DB_HOST:     db
  DB_PORT:     5432
  REDIS_URL:   redis://redis:6379/0
  EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend

services:

  # -------------------------------------------------------------------------
  # PostgreSQL 15
  # -------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       ${DB_NAME:-talentheart_db}
      POSTGRES_USER:     ${DB_USER:-talentheart}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-talentheart_pass}
    ports:
      - "5432:5432"        # expose for local DB tools (remove in prod)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-talentheart} -d ${DB_NAME:-talentheart_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Redis 7
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"        # expose for local inspection (remove in prod)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Django + Gunicorn (web)
  # -------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      <<: *django-env
    volumes:
      - staticfiles:/app/staticfiles   # nginx reads from here
      - media_files:/app/media
      - .:/app                          # live-reload in dev (remove in prod)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"             # internal only — nginx proxies to it
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------------------------------------------------------
  # Nginx (reverse proxy + static file server)
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - staticfiles:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
