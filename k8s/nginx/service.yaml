# =============================================================================
# k8s/nginx/service.yaml
# LoadBalancer service — exposes Nginx to the internet
# On cloud providers this provisions an external load balancer automatically.
# For bare-metal, use MetalLB or NodePort instead.
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: talentheart
  labels:
    app: nginx
  annotations:
    # AWS: provision an internet-facing NLB
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
