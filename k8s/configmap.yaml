# =============================================================================
# k8s/configmap.yaml
# Non-sensitive configuration shared across pods
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: talentheart-config
  namespace: talentheart
data:
  DJANGO_SETTINGS_MODULE: "talentheart.settings"
  DEBUG: "False"
  ALLOWED_HOSTS: "talentheart.com,www.talentheart.com"
  DB_NAME: "talentheart_db"
  DB_USER: "talentheart"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  REDIS_URL: "redis://redis-service:6379/0"
  GUNICORN_WORKERS: "4"
  EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
  EMAIL_HOST: "smtp.gmail.com"
  EMAIL_PORT: "587"
  EMAIL_USE_TLS: "True"
  DEFAULT_FROM_EMAIL: "TalentHeart <noreply@talentheart.com>"
  CONTACT_EMAIL: "info@talentheart.com"
