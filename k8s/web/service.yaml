# =============================================================================
# k8s/web/service.yaml
# ClusterIP — Nginx pods connect to this service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: talentheart-web-service
  namespace: talentheart
  labels:
    app: talentheart-web
spec:
  type: ClusterIP
  selector:
    app: talentheart-web
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
