# =============================================================================
# k8s/postgres/service.yaml
# ClusterIP service — only reachable within the cluster
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: talentheart
  labels:
    app: postgres
    tier: database
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
